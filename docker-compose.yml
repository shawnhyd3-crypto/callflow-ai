version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: callflow_postgres
    environment:
      POSTGRES_USER: callflow
      POSTGRES_PASSWORD: callflow_dev_password
      POSTGRES_DB: callflow_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U callflow']
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: callflow_app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://callflow:callflow_dev_password@postgres:5432/callflow_ai
      NEXTAUTH_SECRET: dev-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      VAPI_API_KEY: ${VAPI_API_KEY}
      VAPI_WEBHOOK_SECRET: ${VAPI_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
